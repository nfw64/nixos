[config]
type = "SchemeFidelity"

#[templates.hypr]
#input_path = '~/.config/matugen/templates/matugen-hypr.conf'
#output_path = '~/.config/hypr/matugen/matugen-hypr.conf'
#post_hook = 'hyprctl reload'

[templates.neovim]
input_path = '~/.config/matugen/templates/colors.json'
output_path = '~/.config/matugen/colors.json'

[templates.niri]
input_path = '~/.config/matugen/templates/niri.kdl'
output_path = '~/.config/niri/colors.kdl'

[templates.cava]
input_path = "~/.config/matugen/templates/cava-colors.ini.template"
output_path = "~/.config/cava/colors"

[templates.tmux]
input_path = '~/.config/matugen/templates/tmux-colors.conf'
output_path = '~/.config/tmux/generated.conf'
# tmux have issues with asynchronous apply.sh script
post_hook = 'tmux source-file ~/.config/tmux/generated.conf'

[templates.fastfetch]
input_path = '~/.config/matugen/templates/matugen-fastfetch.jsonc'
output_path = '~/.config/fastfetch/config.jsonc'

[templates.yazi]
input_path = '~/.config/matugen/templates/yazi-theme.toml'
output_path = '~/.config/yazi/theme.toml'

[templates.pywalfox]
input_path = '~/.config/matugen/templates/pywalfox-colors.json'
output_path = '~/.cache/wal/colors.json'

[templates.kvantum]
input_path = '~/.config/matugen/templates/matugen.kvconfig'
output_path = '~/.config/Kvantum/matugen/matugen.kvconfig'

# Gtk
[templates.gtk]
input_path = '~/.config/matugen/templates/matugen-gtk.css'
output_path = '~/.cache/matugen/colors-gtk.css'

[templates.qt5]
input_path = '~/.config/matugen/templates/qtct-colors.conf'
output_path = '~/.config/qt5ct/colors/matugen-qt5ct.conf'
# cp is too lightweight to be put inside apply.sh
post_hook = 'cp -f ~/.config/qt5ct/colors/matugen-qt5ct.conf ~/.config/qt6ct/colors/matugen-qt6ct.conf'

[templates.quickshell]
input_path = '~/.config/matugen/templates/quickshell.qml'
output_path = '~/.config/quickshell/Theme.qml'

[templates.kitty]
input_path = '~/.config/matugen/templates/kitty-colors.conf'
output_path = '~/.config/kitty/themes/Matugen.conf'
