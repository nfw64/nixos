# https://wiki.hyprland.org/Configuring/Variables/#sections


source = $HOME/.config/hypr/assets/matugen/matugen-hypr.conf

general {
    # Gaps and border
    gaps_in = 4
    gaps_out = 8
    gaps_workspaces = 50
    
    border_size = 1
    resize_on_border = true

    no_focus_fallback = true
    layout=scrolling
    
    allow_tearing = true # This just allows the `immediate` window rule to work
    
    snap {
    	enabled = true
    }
}


decoration {
    rounding = 18
    
    blur {
        enabled = true
        xray = false
        special = false
        new_optimizations = true
        size = 14
        passes = 3
        brightness = 1
        noise = 0.01
        contrast = 1
        popups = true
        popups_ignorealpha = 0.6
        input_methods = true
        input_methods_ignorealpha = 0.8
    }
    
    shadow {
        enabled = false
        ignore_window = true
        range = 30
        offset = 0 2
        render_power = 4
        color = rgba(00000010)
    }
    
    # Dim
    dim_inactive = true
    dim_strength = 0.025
    dim_special = 0.07
}

group {
  col.border_active = $tertiary

   groupbar {
	col.active = $surface
    font_weight_active = bold
    font_weight_inactive = bold
    
    gradients = true
    font_size = 14
    height = 24
    gradient_rounding = 10
    text_color = rgb(acb0d0)

    indicator_height = 0
    indicator_gap = 2
    keep_upper_gap = false
   }
}

dwindle {
    preserve_split = true

    # specifies the scale factor of windows on the special workspace
    # AKA extra gaps for special workspaces
    special_scale_factor = 0.95
}

master {
    new_on_top = true
    new_status = master
    special_scale_factor = 0.95
}

scrolling {
  # fullscreen_on_one_column: bool. default: true
  # - when enabled, a single column on a workspace will always span the entire screen.
  # fullscreen_on_one_column = true

  # column_width: float. default: 0.5
  # - the default width of a column, [0.1 - 1.0].
  column_width = 0.667

  # focus_fit_method: int. default: 0
  # - when a column is focused, what method should be used to bring it into view. 0 = center, 1 = fit
  focus_fit_method = 0

  # follow_focus: bool. default: true
  # - when a window is focused, should the layout move to bring it into view automatically
  # follow_focus = true

  # follow_min_visible: float. default: 0.4
  # - when a window is focused, require that at least a given fraction of it is visible for focus to follow. hard input (e.g. binds, clicks) will always follow. [0.0 - 1.0]
  follow_min_visible = 1.0

  # explicit_column_widths: str. default: 0.333, 0.5, 0.667, 1.0
  # - a comma-separated list of preconfigured widths for colresize +conf/-conf
  explicit_column_widths = 0.334, 0.5, 0.667, 1.0

  # direction: str. default: "right"
  # - direction in which new windows appear and the layout scrolls. left/right/down/up
  # direction = "right"
}

input {
    follow_mouse = 1
    sensitivity = -0.2 
    numlock_by_default = false

    # 0: disabled
    # 1: focus will change to the window under the cursor 
    #    when changing from tiled-to-floating and vice versa
    # 2: focus will also follow mouse on float-to-float switches.
    float_switch_override_focus = 0

    # Controls the window focus behavior when a window is closed. 
    # 0: focus will shift to the next window candidate. 
    # 1: focus will shift to the window under the cursor. 
    # 2: focus will shift to the most recently used/active window.
    focus_on_close = 1
    repeat_delay = 300
    repeat_rate = 50

    touchpad {
	    scroll_factor = 0.2
        natural_scroll = false
        disable_while_typing = false

        # Button presses with 1, 2, or 3 fingers will be mapped to LMB, RMB, and MMB respectively. 
        # This disables interpretation of clicks based on location on the touchpad.
        clickfinger_behavior = true
    }
    
}

cursor {
    inactive_timeout = 10
    enable_hyprcursor = false
}

misc {
    # Disable default random wallpaper
    force_default_wallpaper = 0

    disable_autoreload = true # I use SUPER CTRL + R instead
    disable_hyprland_logo = true

    # Whether Hyprland should focus an app that requests to be focused (an activate request)
    focus_on_activate = true

    # if there is a fullscreen or maximized window, 
    # decide whether a tiled window requested to focus should replace it, 
    # stay behind or disable the fullscreen/maximized state. 
    # 0: ignore focus request (keep focus on fullscreen window) 
    # 1: takes over 
    # 2: unfullscreen/unmaximize
    on_focus_under_fullscreen = 1

    # controls the VRR (Adaptive Sync) of your monitors. 
    # 0: off 
    # 1: on
    # 2: fullscreen only
    # 3: fullscreen with video or game content type
    vrr = 2

    # Disable "App not responding" dialog
    enable_anr_dialog = false
}                                 

xwayland {
    enabled = true
    force_zero_scaling = true
}

binds {
    # If enabled, an attempt to switch to the currently focused workspace 
    # will instead switch to the previous workspace. Akin to i3's auto_back_and_forth
    workspace_back_and_forth = false

    hide_special_on_workspace_change = true
    movefocus_cycles_fullscreen = true
}

render {
    # Whether the color management pipeline should be enabled or not 
    # (requires a restart of Hyprland to fully take effect)
    cm_enabled = true

    # Report content type to allow monitor profile autoswitch 
    # (may result in a black screen during the switch)
    send_content_type = false
}

ecosystem {
    no_update_news = true
    no_donation_nag = true # Sorry :(
}

gestures {
    workspace_swipe_distance = 1000
    workspace_swipe_min_speed_to_force = 1000
    workspace_swipe_direction_lock = false
    workspace_swipe_create_new = false
    workspace_swipe_cancel_ratio = 0.1
}

gesture = 3, vertical, workspace
gesture = 3, left, dispatcher, layoutmsg, focus r
gesture = 3, right, dispatcher, layoutmsg, focus l

