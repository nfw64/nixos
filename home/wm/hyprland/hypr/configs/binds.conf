# тЦДтЦДтЦДтЦД┬╖ тЦк   тЦР тЦД ┬╖тЦДтЦДтЦДтЦД  .тЦДтЦД ┬╖ 
# тЦРтЦИ тЦАтЦИтЦктЦИтЦИ тАвтЦИтЦМтЦРтЦИтЦИтЦИтЦк тЦИтЦИ тЦРтЦИ тЦА. 
# тЦРтЦИтЦАтЦАтЦИтЦДтЦРтЦИ┬╖тЦРтЦИтЦРтЦРтЦМтЦРтЦИ┬╖ тЦРтЦИтЦМтЦДтЦАтЦАтЦАтЦИтЦД
# тЦИтЦИтЦДтЦктЦРтЦИтЦРтЦИтЦМтЦИтЦИтЦРтЦИтЦМтЦИтЦИ. тЦИтЦИ тЦРтЦИтЦДтЦктЦРтЦИ
# ┬╖тЦАтЦАтЦАтЦА тЦАтЦАтЦАтЦАтЦА тЦИтЦктЦАтЦАтЦАтЦАтЦАтАв  тЦАтЦАтЦАтЦА 

# https://wiki.hyprland.org/Configuring/Binds/

$TERMINAL = kitty
$BROWSER = firefox
$FILE_MANAGER = thunar
$CODE = nvim

# ==--==--==--==--==--==--==--==--==--==--==--== #

# Terminal
bind = SUPER,       T, exec, $TERMINAL
bind = SUPER SHIFT, T, exec, [float] $TERMINAL 

bind = SUPER,       tab, workspace, m+1
bind = SUPER SHIFT, tab, workspace, m-1

bind = META CTRL,   Q, killactive,
bind = META CTRL, F4, forcekillactive,

# Launch some apps
bind = SUPER, E, exec, $FILE_MANAGER
bind = SUPER, N, exec, $BROWSER
bind = SUPER, M, exec, $CODE

# ==--==--==--==--==--==--==--==--==--==--==--==  Layout specific binds ==--==--==--==--==--==--==--==--==--==--==--== 

# dwindle only
bind = SUPER, A, layoutmsg, swapsplit
bind = SUPER, D, layoutmsg, togglesplit
bind = SUPER, W, layoutmsg, movetoroot active

### scrolling only
bind = SUPER, comma, layoutmsg, move -col
bind = SUPER, period, layoutmsg, move +col

bind = SUPER, F, layoutmsg, togglefit
# focus

bind = SUPER, W, layoutmsg, focus u
bind = SUPER, A, layoutmsg, focus l
bind = SUPER, S, layoutmsg, focus d
bind = SUPER, D, layoutmsg, focus r
# move windows
bind = SUPER CTRL, A, movewindow, l
bind = SUPER CTRL, D, movewindow, r
bind = SUPER CTRL, S, movewindow, d
bind = SUPER CTRL, W, movewindow, u

# column management

bind = SUPER CTRL, Z, layoutmsg, promote
bind = SUPER, F, layoutmsg, togglefit
bind = SUPER SHIFT,       A, layoutmsg, swapcol l
bind = SUPER SHIFT,       D, layoutmsg, swapcol r

# resize columns
bind = SUPER, equal, layoutmsg, colresize +0.1
bind = SUPER, minus, layoutmsg, colresize -0.1
bind = SUPER,       X, layoutmsg, colresize +conf
bind = SUPER,       Z, layoutmsg, colresize -conf


###

# master / monocle  only
bind = SUPER, A, layoutmsg, cycleprev
bind = SUPER, D, layoutmsg, cyclenext

# ==--==--==--==--==--==--==--==--==--==--==--== ==--==--==--==--==--==--==--==--==--==--==--== ==--==--==--==--==--==--==--==--==--==--==--== 

# Cycle layout for the workspace
bind = SUPER,       grave, exec, cycle_layout
bind = SUPER, bracketleft, exec, cycle_layout --prev

# Reload config
bind = SUPER SHIFT, P, exec, hyprctl reload && notify-send "Hyprland" "Config reloaded!"
# A bunch of rofi menus
bind = SUPER,       R, exec, qs ipc call launcher toggle
bind = SUPER, C, exec, $TOGGLE_ROFI $ROFI_MENUS/clipboard# need replacement
bind = SUPER SHIFT, C, exec, $TOGGLE_ROFI $ROFI_MENUS/icons# need replacement
bind = SUPER,       Y, exec, qs ipc call wallpaper toggle
bind = SUPER SHIFT, SPACE, exec, qs ipc call bar toggle

bind = SUPER,ESCAPE,   exec, $TOGGLE_ROFI $ROFI_MENUS/logout

# Notifications
bind = SUPER SHIFT, Q, exec, qs ipc call notifications dismiss_all
bind = SUPER SHIFT, grave, exec, qs ipc call notifications dnd_toggle

bind = ALT,       M, exec, qs ipc call media toggle
bind = ALT,       period, exec, playerctl next       # next track with SUPER + > 
bind = ALT,       comma,  exec, playerctl previous   # prev track with SUPER + <
bind = ALT,       slash,  exec, qs ipc call media play_pause # play / pause on SUPER + slash

# Screenshot / video_recording
bind =           , Print, exec, screenshot 
bind =      SHIFT, Print, exec, screenshot --select
bind = CTRL      , Print, exec, screenrec
bind = CTRL SHIFT, Print, exec, screenrec --select 


#==--==--==--==--==--==--==--==--==--==--==--==  Window & workspace management  ==--==--==--==--==--==--==--==--==--==--==--== 

 # Works only for floating window
bind = SUPER, U, pin
bind = SUPER SHIFT, E, pseudo

# Minimize window
bind = SUPER CTRL, C, togglespecialworkspace, minimize
bind = SUPER CTRL, C, movetoworkspace, +0
bind = SUPER CTRL, C, togglespecialworkspace, minimize
bind = SUPER CTRL, C, movetoworkspace, special:minimize
bind = SUPER CTRL, C, togglespecialworkspace, minimize

# Change gaps-in / gaps-out
binde = SUPER SHIFT, MINUS, exec, resize_gaps in -2
binde = SUPER CTRL,  MINUS, exec, resize_gaps out -2
binde = SUPER SHIFT, EQUAL, exec, resize_gaps in 2
binde = SUPER CTRL , EQUAL, exec, resize_gaps out 2

# Toggle Floating windows
bind = SUPER,       SPACE, exec, hyprctl --batch "dispatch togglefloating ; dispatch centerwindow 1"
bind = SUPER, Q, fullscreen, 1
bind = SUPER CTRL, apostrophe, centerwindow

# Move focus win + arrow keys
bind = SUPER, left,  movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up,    movefocus, u
bind = SUPER, down,  movefocus, d

# Move windows
bind = SUPER CTRL, left,  movewindow, l  
bind = SUPER CTRL, right, movewindow, r  
bind = SUPER CTRL, up,    movewindow, u  
bind = SUPER CTRL, down,  movewindow, d 

# Swap window 
bind = SUPER SHIFT, left,   swapwindow, l
bind = SUPER SHIFT, right,  swapwindow, r
bind = SUPER SHIFT, up,     swapwindow, u
bind = SUPER SHIFT, down,   swapwindow, d 

# Resize window
bind = SUPER CTRL SHIFT, left,  resizeactive, -70 0
bind = SUPER CTRL SHIFT, right, resizeactive,  70 0
bind = SUPER CTRL SHIFT, up,    resizeactive,  0 -70
bind = SUPER CTRL SHIFT, down,  resizeactive,  0 70

# Workspaces [1-5] 
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5

# Moving windows to workspace [1-5]
bind = SUPER SHIFT, 1, movetoworkspacesilent, 1
bind = SUPER SHIFT, 2, movetoworkspacesilent, 2
bind = SUPER SHIFT, 3, movetoworkspacesilent, 3
bind = SUPER SHIFT, 4, movetoworkspacesilent, 4
bind = SUPER SHIFT, 5, movetoworkspacesilent, 5

# Moving windows to workspace and move to workspace [1-5]
bind = SUPER CTRL, 1, movetoworkspace, 1
bind = SUPER CTRL, 2, movetoworkspace, 2
bind = SUPER CTRL, 3, movetoworkspace, 3
bind = SUPER CTRL, 4, movetoworkspace, 4
bind = SUPER CTRL, 5, movetoworkspace, 5

# Tag window
bind = SUPER, 0, tagwindow, bordered
bind = SUPER, 9, tagwindow, opaque

bind = SUPER, mouse_up, workspace, e+1
bind = SUPER, mouse_down, workspace, e-1

#==--==--==--==--==--==--==--==--==--==--==--== ==--==--==--==--==--==--==--==--==--==--==--== ==--==--==--==--==--==--==--==--==--==--==--== 

# Misc binds
bindel = ,XF86AudioLowerVolume, exec, volume  -5
bindel = ,XF86AudioRaiseVolume, exec, volume  +5

bindl  = ,XF86AudioNext,        exec, playerctl next
bindl  = ,XF86AudioMute,        exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindl  = ,XF86AudioPlayPause,   exec, playerctl play-pause
bindl  = ,XF86AudioPlay,        exec, playerctl play-pause
bindl  = ,XF86AudioPause,       exec, playerctl pause
bindl  = ,XF86MonBrightnessUp,  exec, brightness 5%+ 
bindl  = ,XF86MonBrightnessDown,exec, brightness 5%-
bindl  = ,Pause,                exec, playerctl pause

bind  = ,XF86AudioMicMute,     exec, mictoggle
bind  = ,XF86AudioPrev,        exec, playerctl previous
bind  = ,XF86Calculator,       exec, qalculate-gtk

# Mouse binds
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
