#   ┃ ┃┃┃┃┃ ┃┃ 
#   ┻ ┛ ┗┗┛┗┛┗┛
#              

# Matugen
source-file ~/.config/tmux/generated.conf

# --------------------#
#      Options        #
# --------------------#

# Configure Tmux

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-features ",tmux-256color:RGB"
set -gq allow-passthrough on

set -wg automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set -g detach-on-destroy off

# vim like copy/paste
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# Window title begins by 1 and not 0
set -g mouse on
set-option -g status "on"

# --------------------#
#      Keybinds       #
# --------------------#

# session management
unbind s
bind-key s choose-tree -s "command-prompt -I '#S' -p 'Rename session to:' 'rename-session -t %% \"%%%\"'"
bind "K" run-shell "sesh connect \"$(
        sesh list --icons | fzf-tmux -p 90%,80% \
        --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
        --header '🛸 ^a all | ^w tmux | ^h zoxide | ^x tmux kill | ^f find'  \
        --bind 'tab:down,btab:up' \
        --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
        --bind 'ctrl-w:change-prompt(🪟  )+reload(sesh list -t)' \
        --bind 'ctrl-h:change-prompt(📁  )+reload(sesh list -z --icons)' \
        --bind 'ctrl-f:change-prompt(🔭  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
        --bind 'ctrl-x:execute(tmux kill-session -t {2..})+change-prompt(👽  )+reload(sesh list --icons)' \
        --preview-window 'right:45%' \
        --preview 'sesh preview {}'
)\""
unbind d
bind-key '\' detach-client


# pane management
unbind o
bind-key o break-pane
bind-key O choose-window -F "#{window_index}" "join-pane -h -s '%%'"
unbind m
bind-key m select-layout even-horizontal
bind-key M select-layout even-vertical
# swap and move into window
unbind .
bind-key . command-prompt -p "Move window to index:" "run-shell 'target=%%; tmux swap-window -d -t :\$target; tmux select-window -t :\$target'"
unbind %
unbind [
bind [ split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"



# disable kill accept prompt + other qol stuff
bind x kill-pane
unbind r
bind r source-file $HOME/.config/tmux/tmux.conf
unbind C-b
set -g prefix C-d
bind-key C-d send-prefix
unbind v
bind v copy-mode
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# --------------------#
#        Themes       #
# --------------------#

source-file ~/.config/tmux/theme.conf   

# --------------------#
#  Plugins + Settings #
# --------------------#

set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.config/tmux/.tmux/plugins

set -g @plugin "tmux-plugins/tmux-online-status"
set -g @plugin "tmux-plugins/tmux-battery"

#set -g @plugin 'kristijan/flash-copy.tmux'
#    set -g @flash-copy-bind-key "M-f"
#    set -g @flash-copy-label-colour "\e[0;101m"
#    set -g @flash-copy-highlight-colour "\e[0;100m"
#    set -g @flash-copy-prompt-colour "\033[0;33m"
#    set -g @flash-copy-prompt-indicator ">>>"
set -g @plugin 'ddzero2c/tmux-easymotion#v1.2.2'
    set -g @easymotion-s 'J'
    set -g @easymotion-s2 'Space'
    set -g @easymotion-smartsign 'true'
    set -g @easymotion-copy-mode-no-prefix 'true'
set -g @plugin "christoomey/vim-tmux-navigator"
    set -g @vim_navigator_mapping_left "C-Left C-h"
    set -g @vim_navigator_mapping_right "C-Right C-l"
    set -g @vim_navigator_mapping_up "C-k"
    set -g @vim_navigator_mapping_down "C-j"
set -g @plugin "tmux-plugins/tmux-resurrect"
    set -g @resurrect-save 'S'
    set -g @resurrect-restore 'R'
    set -g @resurrect-capture-pane-contents "on"
    set -g @resurrect-strategy-nvim 'session'
set -g @plugin "tmux-plugins/tmux-continuum"

# --------------------#
#         End         #
# --------------------#
run '~/.config/tmux/.tmux/plugins/tpm/tpm'
