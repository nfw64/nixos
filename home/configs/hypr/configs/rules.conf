# https://wiki.hyprland.org/Configuring/Window-Rules/

$TOP_RIGHT = 1650 50
$BOTTOM_RIGHT = 1460 970
$SMALL = 900 600
windowrule = match:float true, center on
windowrule = float on, match:class org.telegram.desktop, match:title ^(Media viewer)    
windowrule = float on, match:class zenity, match:title ^(Winetricks -)(.*)
windowrule = float on, match:class zenity, match:title winetricks
windowrule = float on, match:class org.gnome.seahorse.Application
windowrule = float on, match:class flameshot
windowrule = fullscreen on, match:class flameshot

windowrule = move $BOTTOM_RIGHT, focus_on_activate no, match:title ^(File Operation Progress)$, match:class (thunar|Thunar)
windowrule = center on,                match:title ^(Confirm to replace files)$, match:class (thunar|Thunar)
windowrule = size 1000 500, center on, match:class rog-control-center
windowrule = size 1340 750, center on, match:title ^(Lutris)$, match:class net.lutris.Lutris

windowrule = stay_focused on, match:class xfce-polkit
windowrule = stay_focused on, match:title ^(Rename device)$, match:class blueman-manager

# Tags
windowrule = float on,               match:tag float
windowrule = opacity 1 override,     match:tag opaque
windowrule = border_size 2 override, match:tag bordered

# Layers
layerrule = animation slide right, match:namespace swaync-control-center
layerrule = no_anim on,            match:namespace awww-daemon
layerrule = no_anim on,            match:namespace selection

windowrule {
    name = Float by title
    match:title = (Font Manager|Volume Control|Qalculate!|Library|Add bookmark)
    
    float = on
    center = on
    persistent_size = on
}

windowrule {
    name = Float by class
    match:class = (blueman-manager|blueman-services|nwg-look|rog-control-center|org.qbittorrent.qBittorrent|kvantummanager|xfce-polkit|org.polymc.PolyMC|engrampa|nm-connection-editor|system-config-printer|net.lutris.Lutris|hyprland-share-picker|org.bleachbit.BleachBit|vlc|exo-desktop-item-edit|xdg-desktop-portal-gtk|org.gnome.eog|qt6ct|spotify|Spotify|xfce-polkit)

    float = on
    center = on
    persistent_size = on
}

windowrule {
    name = Thunar dialogs
    match:class = (thunar|Thunar)
    match:title = (Rename "*.*"|File Operation Progress|Confirm to replace files|Attention)

    float = on
    persistent_size = on
}

windowrule {
    name = Thunar stayfocused
    match:class = (thunar|Thunar)
    match:title = (Attention|Rename "*.*"|Create Document from .*|New .* ...|Create New Folder)

    stay_focused = on
}

windowrule {
    name = Small window size
    match:class = (org.gnome.seahorse.Application|org.polymc.PolyMC|nwg-look)

    size = $SMALL
    center = on
}

#windowrule {
#    name = Full scrolling width
#    match:class = (codium|vesktop|zen)
#
#    
#    scrolling_width = 1.0
#}

windowrule {
    name = Uzerburg
    match:class = ueberzugpp(.*)

    float = on
    no_initial_focus = on
}

windowrule {
    name = dev-tools
    match:title = ^(DevToolsApp)$

    float = on
    move = 50% 15%
    size = $SMALL
}

windowrule {
    name = Alacritty
    match:class = (Alacritty|peaclock)

    opacity = 0.9 0.8
    border_size = 2 override
}

windowrule {
    name = zen-pip
    match:title = Picture-in-Picture
    match:class = ^(zen)(.*)$

    size = 250 140
    move = $TOP_RIGHT
    pin = on
    float = on
    no_initial_focus = on
    border_size = 2 override
    focus_on_activate = no
    keep_aspect_ratio = on
}

windowrule {
    name = Games
    match:class = steam_app_.*

    fullscreen = on
}

windowrule {
    name = peaclock
    match:class = peaclock

    float = on 
    pin = on
    size = 500 260 
    move = 711 60
}

workspace = special:magic, layout:dwindle
