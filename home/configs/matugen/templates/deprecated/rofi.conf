* {
    /* E5 at the end adds transparency to the background */
    background:     {{colors.surface.default.hex}}E5;
    background-alt: {{colors.surface_container.default.hex}}ff;
    background-sec: {{colors.surface_variant.default.hex}}FF;
    foreground:     {{colors.on_surface.default.hex}}ff;
    selected:       {{colors.primary.default.hex}}ff;
    active:         {{colors.tertiary.default.hex}}FF;
    urgent:         {{colors.error.default.hex}}FF;
    highlight:      {{base16.base00.default.hex}};
}
